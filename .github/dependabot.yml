version: 2
updates:
  - package-ecosystem: npm
    directory: /client
    schedule: { interval: weekly }
    open-pull-requests-limit: 5
    groups:
      client-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /server
    schedule: { interval: weekly }
    open-pull-requests-limit: 5
    groups:
      server-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /
    schedule: { interval: weekly }
    open-pull-requests-limit: 3

  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: weekly }
